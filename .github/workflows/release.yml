name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # enable GitHub OIDC token issuance for this job

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from Directory.Build.props
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build src/AzureDevOpsExcelSync/AzureDevOpsExcelSync.csproj -c Release

      - name: Pack
        run: dotnet pack src/AzureDevOpsExcelSync/AzureDevOpsExcelSync.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkg

      - name: Nuget Login (OIDC + temp API Key)
        uses: Nuget/login@v1
        id: login
        with:
          user: ${{secrets.NUGET_USER}}

      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          generate_release_notes: true
          files: nupkg/*.nupkg
